name: Deploy Gateway

on:
  push:
    branches:
      - main
    paths:
      - 'gateway/**'
      - '.github/workflows/deploy-gateway.yml'
  workflow_dispatch:

jobs:
  deploy-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'gateway/package-lock.json'

      - name: Install dependencies
        working-directory: gateway
        run: npm ci

      - name: Build gateway
        working-directory: gateway
        run: npm run build

      - name: Deploy Gateway (placeholder)
        run: |
          echo "=== GATEWAY DEPLOYMENT PLACEHOLDER ==="
          echo "Would deploy: node dist/index.js"
          echo "Port: 3001"
          echo "Environment: production"
          echo "Build artifact: gateway/dist/"
          echo "======================================="

      - name: Echo deployment summary
        run: |
          echo "Gateway deployment workflow complete (stub)"
